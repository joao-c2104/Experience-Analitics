<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Reembolso</title>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; padding: 50px; text-align: center; }
        .box { background: white; padding: 30px; max-width: 500px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin: 10px; }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-secondary { background-color: #9ca3af; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Confirmar Ação de Reembolso</h2>
        <p>Você tem certeza que deseja reembolsar o curso <strong>{{ inscricao.curso.nome }}</strong> para o usuário <strong>{{ inscricao.usuario.username }}</strong>?</p>
        <p style="color: #6b7280; font-size: 14px;">Esta ação não poderá ser desfeita e mudará o status da inscrição para reembolsado.</p>
        
        <form method="POST">
            {% csrf_token %}
            <a href="{% url 'admin_dashboard_financeiro' %}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-danger">Sim, Confirmar Reembolso</button>
        </form>
    </div>
</body>
</html>
