{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main" style="font-family: 'Segoe UI', Arial, sans-serif; padding: 20px;">
    <h1>Confirmar Reembolso</h1>
    <p>Você tem certeza que deseja estornar a inscrição <strong>#{{ inscricao.id }}</strong> do aluno <strong>{{ inscricao.usuario.username }}</strong>?</p>
    <p><strong>Curso:</strong> {{ inscricao.curso.nome }}[cite: 16]</p>

    <form method="post">
        {% csrf_token %}
        <div class="submit-row" style="margin-top: 20px;">
            <input type="submit" value="Sim, Confirmar Reembolso" class="default" style="background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer;">
            <a href="{% url 'admin_dashboard_financeiro' %}" class="button" style="margin-left: 10px; padding: 10px 15px; background: #e5e7eb; color: #374151; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
