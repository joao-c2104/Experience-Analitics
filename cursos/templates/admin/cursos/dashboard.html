<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Admin</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --bg-main: #f3f4f6;
            --dark: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--dark);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .btn-voltar {
            background-color: #6b7280;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }

        /* Cards de Métricas */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 6px solid var(--primary);
        }

        .card.retencao { border-left-color: #3b82f6; }
        .card.abandono { border-left-color: #f59e0b; }
        .card.cancelamento { border-left-color: var(--danger); }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            text-transform: uppercase;
            color: #6b7280;
            letter-spacing: 0.5px;
        }

        .card .valor {
            font-size: 32px;
            font-weight: bold;
            color: #111827;
        }

        /* Tabela */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .table-title {
            padding: 20px;
            background: #f9fafb;
            margin: 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background-color: #f9fafb;
            color: #4b5563;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-reembolso {
            background-color: var(--danger);
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-reembolso:hover {
            background-color: var(--danger-dark);
        }

        /* Mensagens do Django */
        .messages {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }
        .message {
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .message.success {
            background-color: #d1fae5;
            color: #065f46;
        }
    </style>
</head>
<body>

    <div style="background-color:#005b96;color:white;display:flex;justify-content:space-between;align-items:center;padding:15px 30px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:0;">
        <h2 style="margin:0;font-size:24px;">Experience Analytics</h2>
        <div style="display:flex;gap:10px;align-items:center;">
            <span style="font-weight:bold;">Olá, {{ request.user.username }}!</span>
            <a href="{% url 'admin_dashboard_financeiro' %}" style="color:#005b96;background:white;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Dashboard</a>
            <a href="{% url 'relatorios' %}" style="color:#005b96;background:white;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Relatórios</a>
            <a href="{% url 'lista_cursos_admin' %}" style="color:#005b96;background:white;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Lista de Cursos</a>
            <a href="{% url 'sair' %}" style="color:white;background:#e74c3c;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Sair</a>
