<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatórios</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; margin-top: 20px; }
        h1 { color: #005b96; }
        .btn-relatorio {
            display: block;
            background: #005b96;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .btn-relatorio:hover { background: #00416d; }
        a { color: #005b96; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div style="background-color:#005b96;color:white;display:flex;justify-content:space-between;align-items:center;padding:15px 30px;box-shadow:0 2px 5px rgba(0,0,0,0.1);">
        <h2 style="margin:0;font-size:24px;">Sebrae Cursos (Clone)</h2>
        <div style="display:flex;gap:10px;align-items:center;">
            <span style="font-weight:bold;">Olá, {{ request.user.username }}!</span>
            <a href="{% url 'admin_dashboard_financeiro' %}" style="color:#005b96;background:white;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Dashboard</a>
            <a href="{% url 'relatorios' %}" style="color:#005b96;background:white;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Relatórios</a>
            <a href="{% url 'lista_cursos_admin' %}" style="color:#005b96;background:white;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Lista de Cursos</a>
            <a href="{% url 'sair' %}" style="color:white;background:#e74c3c;text-decoration:none;padding:8px 15px;border-radius:5px;font-weight:bold;">Sair</a>
        </div>
    </div>

<div class="container">
    <h1>Relatórios</h1>

    {% for relatorio in relatorios %}
        <a class="btn-relatorio" href="{% url 'detalhe_relatorio' relatorio.id %}">
            Relatório de {{ relatorio.usuario.username }} - {{ relatorio.curso.nome }}
        </a>
    {% empty %}
        <p>Nenhum relatório foi gerado ainda.</p>
    {% endfor %}
</div>
</body>
</html>
